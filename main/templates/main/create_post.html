{% extends 'main/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-sm border-0 p-4">

            <h2 class="mb-4">
                Create Community Post 💬
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Content
                    </label>

                    <textarea name="content"
                              rows="5"
                              class="form-control"></textarea>

                </div>

                <button class="btn btn-primary">
                    Publish Post
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
