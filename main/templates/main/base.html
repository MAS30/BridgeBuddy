<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BridgeBuddy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            BridgeBuddy 🌍
        </a>

        <div>

            <a href="/" class="btn btn-outline-light me-2">
                Home
            </a>

            <a href="/about/" class="btn btn-outline-light me-2">
                About
            </a>

            <a href="/dashboard/" class="btn btn-outline-light me-2">
                Dashboard
            </a>

            <a href="/guides/" class="btn btn-outline-light me-2">
                Guides
            </a>

            <a href="/community/" class="btn btn-outline-light me-2">
                Community
            </a>

            <a href="/phrases/" class="btn btn-outline-warning me-3">
                Turkish Phrases
            </a>

            {% if user.is_authenticated %}

                <span class="text-white me-3">
                    Welcome, {{ user.username }}
                </span>

                <a href="/users/logout/"
                   class="btn btn-danger">

                    Logout

                </a>

            {% else %}

                <a href="/users/login/"
                   class="btn btn-success me-2">

                    Login

                </a>

                <a href="/users/register/"
                   class="btn btn-primary">

                    Register

                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-5">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-dark text-white text-center py-4 mt-5">

    <p class="mb-0">
        BridgeBuddy © 2026 —
        Helping International Students in Türkiye
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
